<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Receipt</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<script>
    (function () {
        var saved = localStorage.getItem("scs-theme");
        var theme = (saved === "dark" || saved === "light")
            ? saved
            : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        if (theme === "dark") {
            document.body.classList.add("dark-mode");
        }
    })();
</script>

<button id="themeToggle" class="theme-toggle-btn" title="Toggle dark mode">🌙</button>

<div class="container mt-5">

    <div class="receipt-card card p-4">

        <div class="text-center">

            <h1 class="store-title">

                SELF CHECKOUT SYSTEM

            </h1>

            <p class="store-subtitle">

                Smart Retail Store

            </p>

            <p>

                Bangalore, Karnataka

                <br>

                Phone : +91 9876543210

            </p>

        </div>

        <hr>

        <div class="row">

            <div class="col-md-6">

                <strong>

                    Transaction ID

                </strong>

                <br>

                <span th:text="${transaction.id}"></span>

            </div>

            <div class="col-md-6 text-end">

                <strong>

                    Date & Time

                </strong>

                <br>

                <span
                        th:text="${transaction.transactionTime}">

                </span>

            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-6">

                <strong>

                    Payment

                </strong>

                <br>

                <span
                        th:text="${transaction.paymentMethod}">

                </span>

            </div>

            <div class="col-md-6 text-end">

                <strong>

                    Cashier

                </strong>

                <br>

                SELF SERVICE

            </div>

        </div>

        <hr>

        <table
                class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>

                    Product

                </th>

                <th>

                    Qty

                </th>

                <th>

                    Price

                </th>

                <th>

                    Total

                </th>

            </tr>

            </thead>

            <tbody>

            <tr
                    th:each="item : ${transaction.items}">

                <td
                        th:text="${item.product.name}">

                </td>

                <td
                        th:text="${item.quantity}">

                </td>

                <td>

                    ₹

                    <span
                            th:text="${item.price}">

                    </span>

                </td>

                <td>

                    ₹

                    <span
                            th:text="${item.lineTotal}">

                    </span>

                </td>

            </tr>

            </tbody>

        </table>

        <hr>

        <div class="text-end">

            <h5>

                Subtotal

                :

                ₹

                <span
                        th:text="${transaction.subtotal}">

                </span>

            </h5>

            <h5>

                GST (18%)

                :

                ₹

                <span
                        th:text="${transaction.tax}">

                </span>

            </h5>

            <h3 class="text-success">

                Grand Total

                :

                ₹

                <span
                        th:text="${transaction.total}">

                </span>

            </h3>

        </div>

        <hr>

        <div class="text-center">

            <h4>

                Thank You For Shopping!

            </h4>

            <p>

                Visit Again 😊

            </p>

            <div
                    class="d-flex justify-content-center gap-3 mt-4">

                <button
                        class="btn btn-success btn-lg"
                        onclick="window.print()">

                    🖨 Print Receipt

                </button>

                <a href="/"
                   class="btn btn-primary btn-lg">

                    New Purchase

                </a>

            </div>

        </div>

    </div>

</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/theme.js}"></script></body>

</html>
