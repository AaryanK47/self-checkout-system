<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Self Checkout System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<!-- Loading Spinner -->
<div id="loadingSpinner" class="spinner-overlay">

    <div class="text-center">

        <div class="loader"></div>

        <h4 class="text-white mt-4">

            Processing Payment...

        </h4>

    </div>

</div>

<!-- Success Popup -->
<div id="successPopup" class="success-popup">

    <div class="checkmark-container">

        <svg
                class="checkmark"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 52 52">

            <circle
                    class="checkmark-circle"
                    cx="26"
                    cy="26"
                    r="25"
                    fill="none"/>

            <path
                    class="checkmark-check"
                    fill="none"
                    d="M14 27l7 7 17-17"/>

        </svg>

    </div>

    <h2>

        PAYMENT SUCCESSFUL

    </h2>

    <hr>

    <h5>

        Amount Paid

    </h5>

    <h3
            id="popupAmount"
            class="text-success">

        ₹0.00

    </h3>

    <h5 class="mt-3">

        Payment Method

    </h5>

    <h4 id="popupMethod">

        Cash

    </h4>

    <hr>

    <p class="text-muted">

        Generating Receipt...

    </p>

</div>
<div class="container mt-5">

    <div class="text-center mb-4">

        <h1 class="store-title">

            SELF CHECKOUT SYSTEM

        </h1>

        <p class="store-subtitle">

            Scan • Pay • Go

        </p>

    </div>

    <!-- Barcode Scan -->

    <div class="card p-4 mb-4">

        <h4 class="mb-3">

            Scan Barcode

        </h4>

        <div class="input-group">

            <input
                    type="text"
                    id="barcodeInput"
                    class="form-control"
                    placeholder="Scan / Enter Barcode">

            <button
                    class="btn btn-primary"
                    onclick="scanBarcode()">

                Scan Product

            </button>

        </div>

    </div>

    <!-- Cart -->

    <div class="card p-4">

        <h3 class="mb-4">

            Shopping Cart

        </h3>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>Product</th>

                <th>Quantity</th>

                <th>Price</th>

                <th>Total</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="cartBody">

            </tbody>

        </table>

        <hr>

        <div class="text-end">

            <h5>

                Subtotal :

                ₹ <span id="subtotal">0.00</span>

            </h5>

            <h5>

                GST (18%) :

                ₹ <span id="tax">0.00</span>

            </h5>

            <h3 class="text-success">

                Grand Total :

                ₹ <span id="total">0.00</span>

            </h3>

        </div>

        <hr>

        <div class="row">

            <div class="col-md-6">

                <label class="fw-bold mb-2">

                    Payment Method

                </label>

                <select
                        id="paymentMethod"
                        class="form-select">

                    <option value="Cash">

                        Cash

                    </option>

                    <option value="Card">

                        Card

                    </option>

                    <option value="UPI">

                        UPI

                    </option>

                </select>

            </div>

            <div class="col-md-6 d-grid align-items-end">

                <button
                        class="btn btn-success btn-lg mt-4"
                        onclick="checkout()">

                    Proceed To Checkout

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Barcode Beep -->
<audio id="beepSound">
    <source th:src="@{/audio/beep.mp3}" type="audio/mpeg">
</audio>

<!-- Payment Success Sound -->
<audio id="successSound">
    <source th:src="@{/audio/success.mp3}" type="audio/mpeg">
</audio>



<script th:src="@{/js/checkout.js}"></script>

</body>

</html>
